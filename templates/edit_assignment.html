{% extends "layout.html" %}

{% block content %}
<style>

.edit-wrapper{
    padding: 30px;
}

.edit-card{
    background: #ffffff;
    border-radius: 20px;
    padding: 35px;
    max-width: 850px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    border: 1px solid #f1f5f9;
}

.edit-card h2{
    font-size: 30px;
    font-weight: 700;
    color: #111827;
    margin-bottom: 10px;
}

.edit-subtitle{
    color: #6b7280;
    font-size: 15px;
    margin-bottom: 30px;
}

.input-group{
    margin-bottom: 24px;
}

.input-group label{
    display: block;
    margin-bottom: 10px;
    font-size: 15px;
    font-weight: 600;
    color: #374151;
}

.input-group input,
.input-group textarea{
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid #d1d5db;
    background: #f9fafb;
    font-size: 15px;
    transition: all 0.3s ease;
}

.input-group input:focus,
.input-group textarea:focus{
    outline: none;
    border-color: #2563eb;
    background: white;
    box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
}

textarea{
    resize: vertical;
}

.update-btn{
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    border: none;
    padding: 14px 22px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.update-btn:hover{
    transform: translateY(-2px);
    box-shadow: 0 8px 18px rgba(37,99,235,0.25);
}

/* FORCE SAME LOOK AS CREATE PAGE */
.create-box{
    background: white;
    padding: 24px;
    border-radius: 18px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    margin-bottom: 30px;
}

/* KEEP INPUT STYLE SAME */
.input-group{
    margin-bottom: 18px;
}

.input-group label{
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: #374151;
}

.input-group input,
.input-group textarea{
    width: 100%;
    padding: 12px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    outline: none;
}

/* BUTTON SAME AS CREATE PAGE */
.create-btn{
    background: #2563eb;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 500;
}

.create-btn:hover{
    background: #1d4ed8;
}


</style>
<div class="create-box">

    <h3>Edit Assignment</h3>

    <form action="/edit_assignment/{{ assignment._id }}"
          method="POST">

        <div class="input-group">

            <label>Assignment Title</label>

            <input type="text"
                   name="title"
                   value="{{ assignment.title }}"
                   required>

        </div>

        <div class="input-group">

            <label>Description</label>

            <textarea name="description"
                      rows="4"
                      required>{{ assignment.description }}</textarea>

        </div>

        <div class="input-group">

            <label>Deadline</label>

            <input type="date"
                   name="deadline"
                   value="{{ assignment.deadline }}"
                   required>

        </div>

        <button type="submit"
                class="create-btn">

            Update Assignment

        </button>

    </form>

</div>

{% endblock %}
