<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="overlay">

    <div class="box">

        <h1>Login</h1>

        <!-- Student Login -->
        <form action="/student_login" method="POST">

            <h2>Student Login</h2>

            <input type="text"
            name="username"
            placeholder="Username"
            required>

            <input type="password"
            name="password"
            placeholder="Password"
            required>

            <button type="submit">Login</button>

        </form>

        <hr>

        <!-- Teacher Login -->
        <form action="/teacher_login" method="POST">

            <h2>Teacher Login</h2>

            <input type="text"
            name="username"
            placeholder="Username"
            required>

            <input type="password"
            name="password"
            placeholder="Password"
            required>

            <button type="submit">Login</button>

        </form>

        <p class="signup-text">

            Don't have an account ?

            <a href="/signup">Signup</a>

        </p>

    </div>

</div>

</body>
</html>
