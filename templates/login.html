<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EduPortal Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div id="toast-container"></div>

<div class="main-container">

    <!-- Left Side -->

    <div class="left-section">

        <div class="overlay"></div>

        <div class="content">

            <h1>Welcome to EduPortal</h1>

            <p>
                Smart Student & Teacher Management System
            </p>

        </div>

    </div>

    <!-- Right Side -->

    <div class="right-section">

        <div class="login-card">

            <h2>Login</h2>

            <p class="subtitle">
                Continue your learning journey
            </p>

            <!-- Single Login Form -->

            <form action="/login"
            method="POST"
            autocomplete="off">

                <div class="input-group">

                    <i class="fa-solid fa-envelope"></i>

                    <input type="email"
                    name="email"
                    placeholder="Enter Email"
                    required>

                </div>

                <div class="input-group">

                    <i class="fa-solid fa-lock"></i>

                    <input type="password"
                    name="password"
                    placeholder="Password"
                    required>

                </div>

                <button type="submit"
                class="login-btn">
                    Login
                </button>

            </form>

            <div class="bottom-links">

                <a href="/forgot_password">
                    Forgot Password?
                </a>

                <p>
                    Don't have an account?
                    <a href="/signup">Signup</a>
                </p>

            </div>

        </div>

    </div>

</div>

<script>

function showToast(message) {

    let toast = document.createElement("div");
    toast.className = "toast";
    toast.innerText = message;

    document.getElementById("toast-container").appendChild(toast);

    setTimeout(() => {
        toast.classList.add("hide");
        setTimeout(() => toast.remove(), 500);
    }, 3000);
}

</script>

<script>

const messages = JSON.parse('{{ get_flashed_messages(with_categories=true) | tojson | safe }}');

window.onload = function () {

    if (messages && messages.length > 0) {

        messages.forEach(msg => showToast(msg[1]));
    }
};

</script>

</body>
</html>
