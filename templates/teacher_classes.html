{% extends "layout.html" %}

{% block content %}

<style>

.page-header{
    margin-bottom: 25px;
}

.page-header h2{
    font-size: 30px;
    font-weight: 700;
    color: #111827;
    margin-bottom: 6px;
}

.page-header p{
    color: #6b7280;
    font-size: 15px;
}

.create-box{
    background: white;
    padding: 24px;
    border-radius: 18px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    margin-bottom: 30px;
}

.create-box h3{
    margin-bottom: 20px;
    color: #111827;
}

.input-group{
    margin-bottom: 18px;
}

.input-group label{
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: #374151;
}

.input-group input,
.input-group textarea{
    width: 100%;
    padding: 12px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    outline: none;
}

.create-btn{
    background: #2563eb;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 500;
}

.create-btn:hover{
    background: #1d4ed8;
}

.course-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 25px;
}

.course-card{
    background: white;
    border-radius: 18px;
    padding: 24px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    transition: 0.3s;
}

.course-card:hover{
    transform: translateY(-5px);
}

.course-top{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
}

.course-icon{
    width: 55px;
    height: 55px;
    border-radius: 14px;
    background: rgba(37,99,235,0.1);
    display: flex;
    justify-content: center;
    align-items: center;
}

.course-icon i{
    color: #2563eb;
    font-size: 24px;
}

.course-actions{
    display: flex;
    gap: 14px;
}

.course-actions a,
.course-actions button{
    background: none;
    border: none;
    cursor: pointer;
    font-size: 17px;
}

.edit-icon{
    color: #2563eb;
}

.delete-icon{
    color: #ef4444;
}

.course-card h3{
    font-size: 22px;
    margin-bottom: 12px;
    color: #111827;
}

.course-card p{
    color: #6b7280;
    line-height: 1.6;
    font-size: 14px;
}

</style>

<div class="page-header">
    <h2>Courses</h2>
    <p>Create and manage your courses professionally</p>
</div>

<!-- ADD COURSE -->
<div class="create-box">

    <h3>Add New Course</h3>

    <form action="/add_course" method="POST">

        <div class="input-group">
            <label>Course Name</label>
            <input type="text" name="course_name" required>
        </div>

        <div class="input-group">
            <label>Course Description</label>
            <textarea name="course_description"
                      rows="4"
                      required></textarea>
        </div>

        <button type="submit" class="create-btn">
            Add Course
        </button>

    </form>

</div>

<!-- COURSE LIST -->
<div class="course-grid">

    {% for c in courses %}

    <div class="course-card">

        <div class="course-top">

            <div class="course-icon">
                <i class="fa-solid fa-book-open"></i>
            </div>

            <div class="course-actions">

                <button>
                    <i class="fa-solid fa-pen edit-icon"></i>
                </button>

                <a href="/delete_course/{{ c._id }}">
                    <i class="fa-solid fa-trash delete-icon"></i>
                </a>

            </div>

        </div>

        <h3>{{ c.course_name }}</h3>

        <p>{{ c.course_description }}</p>

    </div>

    {% endfor %}

</div>

{% endblock %}
