{% extends "layout.html" %}

{% block content %}

<style>

.assignment-wrapper{
    padding: 10px 5px;
}

.assignment-header{
    margin-bottom: 25px;
}

.assignment-header h2{
    font-size: 30px;
    font-weight: 700;
    color: #111827;
    margin-bottom: 6px;
}

.assignment-header p{
    color: #6b7280;
    font-size: 15px;
}

.assignment-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 25px;
}

.assignment-card{
    background: white;
    border-radius: 18px;
    padding: 24px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    transition: 0.3s;
    position: relative;
}

.assignment-card:hover{
    transform: translateY(-5px);
}

.assignment-top{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
}

.assignment-icon{
    width: 55px;
    height: 55px;
    border-radius: 14px;
    background: rgba(37,99,235,0.1);
    display: flex;
    justify-content: center;
    align-items: center;
}

.assignment-icon i{
    color: #2563eb;
    font-size: 24px;
}

.assignment-actions{
    display: flex;
    gap: 14px;
}

.assignment-actions a,
.assignment-actions button{
    border: none;
    background: none;
    cursor: pointer;
    font-size: 17px;
}

.edit-icon{
    color: #2563eb;
}

.delete-icon{
    color: #ef4444;
}

.assignment-card h3{
    font-size: 21px;
    color: #111827;
    margin-bottom: 12px;
}

.assignment-card p{
    color: #6b7280;
    line-height: 1.6;
    font-size: 14px;
    margin-bottom: 20px;
}

.assignment-footer{
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.deadline{
    color: #ef4444;
    font-size: 14px;
    font-weight: 500;
}

.create-box{
    background: white;
    padding: 24px;
    border-radius: 18px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    margin-bottom: 30px;
}

.create-box h3{
    margin-bottom: 20px;
    color: #111827;
}

.input-group{
    margin-bottom: 18px;
}

.input-group label{
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: #374151;
}

.input-group input,
.input-group textarea{
    width: 100%;
    padding: 12px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    outline: none;
}

.create-btn{
    background: #2563eb;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 500;
}

.create-btn:hover{
    background: #1d4ed8;
}

</style>

<div class="assignment-wrapper">

    <div class="assignment-header">
        <h2>Assignments</h2>
        <p>Create and manage assignments professionally</p>
    </div>

    <!-- CREATE ASSIGNMENT -->
    <div class="create-box">

        <h3>Create New Assignment</h3>

        <form action="/add_assignment" method="POST">

            <div class="input-group">
                <label>Assignment Title</label>
                <input type="text" name="title" required>
            </div>

            <div class="input-group">
                <label>Description</label>
                <textarea name="description"
                          rows="4"
                          required></textarea>
            </div>

            <div class="input-group">
                <label>Deadline</label>
                <input type="date" name="deadline" required>
            </div>

            <button type="submit" class="create-btn">
                Create Assignment
            </button>

        </form>

    </div>

    <!-- ASSIGNMENT LIST -->
    <div class="assignment-grid">

        {% for a in assignments %}

        <div class="assignment-card">

            <div class="assignment-top">

                <div class="assignment-icon">
                    <i class="fa-solid fa-file-lines"></i>
                </div>

                <div class="assignment-actions">
                    <a href="/edit_assignment/{{ a._id }}">
                        <i class="fa-solid fa-pen edit-icon"></i>
                    </a>

                    <a href="/delete_assignment/{{ a._id }}">
                        <i class="fa-solid fa-trash delete-icon"></i>
                    </a>

                </div>

            </div>

            <h3>{{ a.title }}</h3>

            <p>{{ a.description }}</p>

            <div class="assignment-footer">

                <div class="deadline">
                    Deadline: {{ a.deadline }}
                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
