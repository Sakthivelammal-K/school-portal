{% extends "layout.html" %}

{% block content %}

<style>

.dashboard-header{
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    padding: 35px;
    border-radius: 24px;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 35px;
    box-shadow: 0 10px 25px rgba(37,99,235,0.25);
}

.dashboard-header h1{
    font-size: 42px;
    margin-bottom: 10px;
    font-weight: 700;
}

.dashboard-header p{
    font-size: 17px;
    opacity: 0.9;
}

.dashboard-icon{
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    justify-content: center;
    align-items: center;
}

.dashboard-icon i{
    font-size: 42px;
    color: white;
}

.section-title{
    margin-bottom: 25px;
}

.section-title h2{
    font-size: 34px;
    color: #0f172a;
    margin-bottom: 6px;
}

.section-title p{
    color: #64748b;
    font-size: 16px;
}

.stats{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
    gap: 28px;
}

.stat-card{
    background: white;
    padding: 30px;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    transition: 0.35s;
    border: 1px solid #e2e8f0;
}

.stat-card:hover{
    transform: translateY(-8px);
    box-shadow: 0 14px 30px rgba(37,99,235,0.15);
}

.stat-card::before{
    content: "";
    position: absolute;
    width: 140px;
    height: 140px;
    background: rgba(37,99,235,0.05);
    border-radius: 50%;
    top: -40px;
    right: -40px;
}

.stat-top{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.stat-icon{
    width: 70px;
    height: 70px;
    border-radius: 18px;
    background: linear-gradient(135deg,#dbeafe,#bfdbfe);
    display: flex;
    justify-content: center;
    align-items: center;
}

.stat-icon i{
    font-size: 30px;
    color: #2563eb;
}

.stat-number{
    font-size: 46px;
    font-weight: 700;
    color: #2563eb;
}

.stat-card h3{
    font-size: 28px;
    margin-bottom: 12px;
    color: #0f172a;
}

.stat-card p{
    color: #64748b;
    line-height: 1.6;
    font-size: 15px;
}

</style>

<!-- SECTION TITLE -->

<div class="section-title">

    <h2>Dashboard</h2>

    <p>
        Monitor students, courses and assignments professionally
    </p>

</div>

<!-- STATS -->

<div class="stats">

    <!-- STUDENTS -->

    <div class="stat-card">

        <div class="stat-top">

            <div class="stat-icon">
                <i class="fa-solid fa-users"></i>
            </div>
                <h3>Total Students</h3>

            <div class="stat-number">
                {{ total_students }}
            </div>
        </div>

    </div>

    <!-- ASSIGNMENTS -->

    <div class="stat-card">

        <div class="stat-top">

            <div class="stat-icon">
                <i class="fa-solid fa-file-lines"></i>
            </div>

            <h3>Total Assignments</h3>
            <div class="stat-number">
                {{ total_assignments }}
            </div>

        </div>


    </div>

    <!-- ENROLLED COURSE -->

    <div class="stat-card">

        <div class="stat-top">

            <div class="stat-icon">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>

            <h3>Enrolled Course</h3>
            <div class="stat-number">
                {{ course }}
            </div>

        </div>


    </div>

</div>

{% endblock %}
