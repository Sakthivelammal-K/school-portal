<!DOCTYPE html>
<html>

<head>

<title>Verify OTP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#2563eb,#1e3a8a);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    width:400px;
    text-align:center;
}

input{
    width:100%;
    padding:14px;
    margin:20px 0;
    border:1px solid #ccc;
    border-radius:12px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:#95adde;
    color:white;
    border-radius:12px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Verify OTP</h2>

<form action="/verify_otp" method="POST">

<input type="text"
name="otp"
placeholder="Enter OTP"
required>

<button type="submit">
Verify OTP
</button>

</form>

</div>

</body>
</html>
