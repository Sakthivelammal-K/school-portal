<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Signup - EduPortal</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='signup.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>
<div id="toast-container"></div>
<div class="container">

    <!-- LEFT SECTION -->

    <div class="left-side">

        <div class="overlay"></div>

        <div class="content">

            <h1>Join EduPortal</h1>

            <p>
                Create your account and continue your learning journey
            </p>

        </div>

    </div>

    <!-- RIGHT SECTION -->

    <div class="right-side">

        <div class="signup-card">

            <h2>Create Account</h2>

            <p class="subtitle">

                Signup as Student or Teacher

            </p>

            <!-- TABS -->

            <div class="tabs">

                <button class="tab-btn active"
                onclick="showStudent()">

                    <i class="fa-solid fa-user-graduate"></i>
                    Student

                </button>

                <button class="tab-btn"
                onclick="showTeacher()">

                    <i class="fa-solid fa-chalkboard-user"></i>
                    Teacher

                </button>

            </div>

            <!-- STUDENT FORM -->

            <form id="studentForm"
            action="/student_signup"
            method="POST">

                <div class="input-group">

                    <i class="fa-solid fa-user"></i>

                    <input type="text"
                    name="username"
                    placeholder="Student Username"
                    required>

                </div>

                <div class="input-group">

                    <i class="fa-solid fa-envelope"></i>

                    <input type="email"
                    name="email"
                    placeholder="Student Email"
                    required>

                </div>

                <div class="input-group">

                    <i class="fa-solid fa-book"></i>
<div class="input-group">

    <i class="fa-solid fa-book"></i>

    <select name="course" required>

        <option value="" disabled selected>Select Course</option>

        {% for course in courses %}
            <option value="{{ course.course_name }}">
                {{ course.course_name }}
            </option>
        {% endfor %}

    </select>

</div>
                </div>

                <div class="input-group">

                    <i class="fa-solid fa-lock"></i>

                    <input type="password"
                    name="password"
                    placeholder="Password"
                    required>

                </div>

                <button type="submit"
                class="signup-btn">

                    Signup as Student

                </button>

            </form>

            <!-- TEACHER FORM -->

            <form id="teacherForm"
            action="/teacher_signup"
            method="POST"
            style="display:none;">

                <div class="input-group">

                    <i class="fa-solid fa-user-tie"></i>

                    <input type="text"
                    name="username"
                    placeholder="Teacher Username"
                    required>

                </div>

                <div class="input-group">

                    <i class="fa-solid fa-envelope"></i>

                    <input type="email"
                    name="email"
                    placeholder="Teacher Email"
                    required>

                </div>

                <div class="input-group">

                    <i class="fa-solid fa-lock"></i>

                    <input type="password"
                    name="password"
                    placeholder="Password"
                    required>

                </div>

                <button type="submit"
                class="signup-btn">

                    Signup as Teacher

                </button>

            </form>

            <!-- LOGIN LINK -->

            <div class="bottom-links">

                <p>

                    Already have an account?

                    <a href="/">Login</a>

                </p>

            </div>

        </div>

    </div>

</div>

<!-- JAVASCRIPT -->

<script>

function showToast(message) {

    let toast = document.createElement("div");
    toast.className = "toast";
    toast.innerText = message;

    document.getElementById("toast-container").appendChild(toast);

    setTimeout(() => {
        toast.classList.add("hide");
        setTimeout(() => toast.remove(), 500);
    }, 3000);
}

const messages = JSON.parse('{{ get_flashed_messages(with_categories=true) | tojson | safe }}');

window.onload = function () {

    if (messages && messages.length > 0) {

        messages.forEach(msg => showToast(msg[1]));

    }
};

function showStudent(){

    document.getElementById("studentForm")
    .style.display = "block";

    document.getElementById("teacherForm")
    .style.display = "none";

    document.querySelectorAll(".tab-btn")[0]
    .classList.add("active");

    document.querySelectorAll(".tab-btn")[1]
    .classList.remove("active");
}

function showTeacher(){

    document.getElementById("teacherForm")
    .style.display = "block";

    document.getElementById("studentForm")
    .style.display = "none";

    document.querySelectorAll(".tab-btn")[1]
    .classList.add("active");

    document.querySelectorAll(".tab-btn")[0]
    .classList.remove("active");
}

</script>

</body>
</html>
