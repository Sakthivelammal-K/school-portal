<!DOCTYPE html>
<html>
<head>

    <title>Signup</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="overlay">

    <div class="box">

        <h1>Create Account</h1>

        <!-- Student Signup -->
        <form action="/student_signup" method="POST">

            <h2>Student Signup</h2>

            <input type="text"
            name="username"
            placeholder="Username"
            required>

            <input type="password"
            name="password"
            placeholder="Password"
            required>

            <select name="course" required>

    <option value="">Select Course</option>

    <option value="Python Programming">
        Python Programming
    </option>

    <option value="Web Development">
        Web Development
    </option>

    <option value="Database Systems">
        Database Systems
    </option>

    <option value="Artificial Intelligence">
        Artificial Intelligence
    </option>

</select>

            <button type="submit">Signup</button>

        </form>

        <hr>

        <!-- Teacher Signup -->
        <form action="/teacher_signup" method="POST">

            <h2>Teacher Signup</h2>

            <input type="text"
            name="username"
            placeholder="Username"
            required>

            <input type="password"
            name="password"
            placeholder="Password"
            required>

            <button type="submit">Signup</button>

        </form>

        <p class="signup-text">

            Already have an account ?

            <a href="/">Login</a>

        </p>

    </div>

</div>

</body>
</html>
