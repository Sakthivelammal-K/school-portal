<div class="tabs">

    <button class="tab-btn active"
    onclick="showStudent()">

        Student

    </button>

    <button class="tab-btn"
    onclick="showTeacher()">

        Teacher

    </button>

</div>

<!-- STUDENT SIGNUP -->

<form id="studentForm"
action="/student_signup"
method="POST">

    <div class="input-group">

        <input type="text"
        name="username"
        placeholder="Student Username"
        required>

    </div>

    <div class="input-group">

        <input type="email"
        name="email"
        placeholder="Student Email"
        required>

    </div>

    <div class="input-group">

        <input type="password"
        name="password"
        placeholder="Password"
        required>

    </div>

    <button type="submit"
    class="signup-btn">

        Signup as Student

    </button>

</form>

<!-- TEACHER SIGNUP -->

<form id="teacherForm"
action="/teacher_signup"
method="POST"
style="display:none;">

    <div class="input-group">

        <input type="text"
        name="username"
        placeholder="Teacher Username"
        required>

    </div>

    <div class="input-group">

        <input type="email"
        name="email"
        placeholder="Teacher Email"
        required>

    </div>

    <div class="input-group">

        <input type="password"
        name="password"
        placeholder="Password"
        required>

    </div>

    <button type="submit"
    class="signup-btn">

        Signup as Teacher

    </button>

</form>
